<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Global Bank - Apply</title>
    <style>
        :root {
            --primary-gold: #c5a059;
            --dark-blue: #00334e;
            --glass: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            /* Background Image - Modern Bank Lobby */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1554469384-e58fac16e23a?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* Glassmorphism Form */
        .application-form {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group.full-width {
            grid-column: span 2;
        }

        label {
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #eee;
        }

        input, select, textarea {
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--primary-gold);
        }

        select option {
            background: #222;
            color: white;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            grid-column: span 2;
            padding: 15px;
            background: linear-gradient(45deg, #004e75, #00334e);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: var(--primary-gold);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Features/Service Cards */
        .features {
            display: flex;
            gap: 20px;
            margin-top: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: rgba(0,0,0,0.6);
            border-bottom: 3px solid var(--primary-gold);
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            background: rgba(0,0,0,0.8);
        }

        .card h3 {
            font-size: 1rem;
            margin: 0;
            color: var(--primary-gold);
        }

        @media (max-width: 600px) {
            .application-form {
                grid-template-columns: 1fr;
            }
            .input-group.full-width {
                grid-column: span 1;
            }
            .submit-btn {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <h1>Apply for Banking Service</h1>
            <p>Experience the future of premium finance.</p>
        </div>

        <form class="application-form">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="Nathan" required>
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="+233 000-0000" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com" required>
            </div>

            <div class="input-group">
                <label>Account Type</label>
                <select>
                    <option>Savings Account</option>
                    <option>Checking Account</option>
                    <option>Business Account</option>
                    <option>Fixed Deposit</option>
                </select>
            </div>

            <div class="input-group full-width">
                <label>Message / Additional Requirements</label>
                <textarea placeholder="Tell us more about your needs..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit Application</button>
        </form>

        <div class="features">
            <div class="card">
                <h3>Secure Vaults</h3>
            </div>
            <div class="card">
                <h3>24/7 Support</h3>
            </div>
            <div class="card">
                <h3>Global Access</h3>
            </div>
        </div>
    </div>

</body>
</html>
